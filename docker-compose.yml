version: "3.9"

services:

  # ── Churn Prediction API ──────────────────────────────────────────────────
  churn-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: churn_prediction_api
    ports:
      - "8000:8000"
    volumes:
      # Mount models dir so you can hot-swap a new model without rebuilding
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - mlflow-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MLflow Tracking Server ────────────────────────────────────────────────
  mlflow-server:
    image: python:3.10-slim
    container_name: mlflow_tracking_server
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    command: >
      sh -c "pip install mlflow --quiet &&
             mlflow server
               --backend-store-uri sqlite:////mlflow.db
               --default-artifact-root /mlruns
               --host 0.0.0.0
               --port 5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: churn_network
